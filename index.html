    <!-- ============================================= -->
    <!-- SCRIPT DE REDIRECCIÓN (SOLO SE ACTIVA SI LO PONES EN true) -->
    <!-- ============================================= -->
    <script>
    (function() {
        // ==========================================
        // 👇 CAMBIA ESTO CUANDO QUIERAS 👇
        // ==========================================
        var ACTIVAR_REDIRECCION = false;   // false = EL SCRIPT NO HACE NADA (función original)
                                           // true  = redirige a DESTINO_URL
        var DESTINO_URL = 'https://www.google.com';
        // ==========================================
        
        // Si está en false, el script NO hace absolutamente NADA
        if (!ACTIVAR_REDIRECCION) {
            console.log('🔘 Script desactivado - El botón "Aceptar cookies" funciona NORMAL');
            return;  // Salimos del script, no hace nada
        }
        
        // ==========================================
        // SOLO EJECUTA ESTO CUANDO ACTIVAR_REDIRECCION = true
        // ==========================================
        console.log('🚀 Script activado - El botón "Aceptar cookies" REDIRIGIRÁ a: ' + DESTINO_URL);
        
        var yaModificado = false;
        
        function modificarBoton() {
            var boton = document.querySelector('[data-testid="button-cookie-accept"]');
            if (!boton) return false;
            if (yaModificado) return true;
            
            // Reemplazar el botón para quitar eventos originales
            var nuevoBoton = boton.cloneNode(true);
            boton.parentNode.replaceChild(nuevoBoton, boton);
            
            // Agregar nuestro evento de redirección
            nuevoBoton.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                window.location.href = DESTINO_URL;
            });
            
            yaModificado = true;
            console.log('✅ Botón "Aceptar cookies" modificado para REDIRIGIR');
            return true;
        }
        
        // Observar cambios en el DOM para encontrar el botón
        var observador = new MutationObserver(function() {
            if (modificarBoton()) observador.disconnect();
        });
        observador.observe(document.body, { childList: true, subtree: true });
        modificarBoton();
        
        // Control desde consola (opcional)
        window.controlarCookie = {
            cambiarUrl: function(url) {
                DESTINO_URL = url;
                console.log('🔗 Nueva URL destino: ' + url);
            }
        };
    })();
    </script>
