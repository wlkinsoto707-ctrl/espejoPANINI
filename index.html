    <!-- ============================================= -->
    <!-- SCRIPT PARA AMBOS BOTONES (ACEPTAR Y RECHAZAR) -->
    <!-- ============================================= -->
    <script>
    (function() {
        // ==========================================
        // 👇 CONFIGURACIÓN - CAMBIA ESTO CUANDO QUIERAS
        // ==========================================
        var ACTIVAR_REDIRECCION = false;   // false = función original, true = redirigen ambos
        var DESTINO_URL = 'https://www.google.com';  // Sitio web de destino
        // ==========================================
        
        // Si está en false, el script NO hace nada (función original)
        if (!ACTIVAR_REDIRECCION) {
            console.log('🔘 Script desactivado - Los botones funcionan NORMAL');
            return;
        }
        
        console.log('🚀 Script activado - AMBOS botones redirigirán a: ' + DESTINO_URL);
        
        var botonesModificados = {
            aceptar: false,
            rechazar: false
        };
        
        // Función para forzar redirección
        function forzarRedireccion(e) {
            if (e) {
                e.preventDefault();
                e.stopPropagation();
                e.stopImmediatePropagation();
            }
            console.log('🔄 Redirigiendo a: ' + DESTINO_URL);
            window.location.href = DESTINO_URL;
            return false;
        }
        
        // Función para modificar un botón específico
        function modificarBoton(selector, nombre) {
            var boton = document.querySelector(selector);
            if (!boton) return false;
            if (botonesModificados[nombre]) return true;
            
            // Reemplazar el botón para quitar eventos originales
            var nuevoBoton = boton.cloneNode(true);
            boton.parentNode.replaceChild(nuevoBoton, boton);
            
            // Agregar eventos para asegurar la redirección
            nuevoBoton.onclick = forzarRedireccion;
            nuevoBoton.addEventListener('click', forzarRedireccion);
            
            botonesModificados[nombre] = true;
            console.log('✅ Botón "' + nombre + '" modificado para REDIRIGIR');
            return true;
        }
        
        // Función para modificar ambos botones
        function modificarAmbosBotones() {
            var aceptarOk = modificarBoton('[data-testid="button-cookie-accept"]', 'aceptar');
            var rechazarOk = modificarBoton('[data-testid="button-cookie-reject"]', 'rechazar');
            return aceptarOk || rechazarOk;
        }
        
        // Intentar encontrar los botones cada 500ms durante 10 segundos
        var intentos = 0;
        var maxIntentos = 20;
        
        var intervalo = setInterval(function() {
            intentos++;
            
            if (modificarAmbosBotones()) {
                if (botonesModificados.aceptar && botonesModificados.rechazar) {
                    console.log('🎉 AMBOS botones modificados exitosamente');
                    clearInterval(intervalo);
                } else if (intentos >= maxIntentos) {
                    console.log('⚠️ Se modificaron solo algunos botones:');
                    console.log('   Aceptar: ' + (botonesModificados.aceptar ? '✅' : '❌'));
                    console.log('   Rechazar: ' + (botonesModificados.rechazar ? '✅' : '❌'));
                    clearInterval(intervalo);
                }
            }
            
            if (intentos >= maxIntentos) {
                clearInterval(intervalo);
            }
        }, 500);
        
        // Observar cambios en el DOM para detectar botones que aparecen tarde
        var observador = new MutationObserver(function() {
            modificarAmbosBotones();
            if (botonesModificados.aceptar && botonesModificados.rechazar) {
                observador.disconnect();
            }
        });
        observador.observe(document.body, { childList: true, subtree: true });
        
        // Control desde consola
        window.controlarBotones = {
            activar: function(url) {
                ACTIVAR_REDIRECCION = true;
                if (url) DESTINO_URL = url;
                console.log('✅ Redirección ACTIVADA para AMBOS botones hacia: ' + DESTINO_URL);
                modificarAmbosBotones();
            },
            desactivar: function() {
                ACTIVAR_REDIRECCION = false;
                console.log('❌ Redirección DESACTIVADA - Los botones funcionan NORMAL');
                console.log('🔄 Recarga la página para que vuelvan a la función original');
            },
            cambiarUrl: function(url) {
                DESTINO_URL = url;
                console.log('🔗 Nueva URL destino: ' + url);
            },
            estado: function() {
                console.log('📊 Estado actual:');
                console.log('   Redirección: ' + (ACTIVAR_REDIRECCION ? 'ACTIVADA' : 'DESACTIVADA'));
                console.log('   URL destino: ' + DESTINO_URL);
                console.log('   Botón Aceptar: ' + (botonesModificados.aceptar ? '✅ Modificado' : '⏳ Pendiente'));
                console.log('   Botón Rechazar: ' + (botonesModificados.rechazar ? '✅ Modificado' : '⏳ Pendiente'));
            }
        };
        
        console.log('🎮 Script para AMBOS botones cargado');
        console.log('💡 Usa window.controlarBotones.activar("https://tusitio.com") para activar');
    })();
    </script>
