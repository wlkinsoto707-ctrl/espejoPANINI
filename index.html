    <div id="root"></div>
    
    <!-- ============================================= -->
    <!-- SCRIPT DE REDIRECCIÓN CON DIAGNÓSTICO -->
    <!-- ============================================= -->
    <script>
    (function() {
        // ==========================================
        // 👇 CONFIGURACIÓN
        // ==========================================
        var ACTIVAR_REDIRECCION = false;   // true = redirige
        var DESTINO_URL = 'https://www.google.com';
        // ==========================================
        
        if (!ACTIVAR_REDIRECCION) {
            console.log('🔘 Script desactivado');
            return;
        }
        
        console.log('🚀 Buscando botón de aceptar cookies...');
        
        // Función para forzar la redirección de manera MUY agresiva
        function forzarRedireccion(e) {
            if (e) {
                e.preventDefault();
                e.stopPropagation();
                e.stopImmediatePropagation();
            }
            console.log('🔄 Redirigiendo a: ' + DESTINO_URL);
            window.location.href = DESTINO_URL;
            return false;
        }
        
        // Función para modificar el botón
        function modificarBoton() {
            // Buscar por diferentes selectores posibles
            var boton = document.querySelector('[data-testid="button-cookie-accept"]');
            
            if (!boton) {
                console.log('⚠️ No se encontró el botón con [data-testid="button-cookie-accept"]');
                return false;
            }
            
            console.log('✅ Botón encontrado:', boton);
            
            // Eliminar TODOS los eventos del botón
            var nuevoBoton = boton.cloneNode(true);
            boton.parentNode.replaceChild(nuevoBoton, boton);
            
            // Agregar eventos en cascada para asegurar la redirección
            nuevoBoton.onclick = forzarRedireccion;
            nuevoBoton.addEventListener('click', forzarRedireccion);
            nuevoBoton.addEventListener('mousedown', forzarRedireccion);
            nuevoBoton.addEventListener('mouseup', forzarRedireccion);
            
            console.log('✅ Botón modificado exitosamente');
            return true;
        }
        
        // Intentar encontrar el botón cada 500ms durante 10 segundos
        var intentos = 0;
        var maxIntentos = 20;
        
        var intervalo = setInterval(function() {
            intentos++;
            console.log('🔍 Intento ' + intentos + ' de ' + maxIntentos);
            
            if (modificarBoton()) {
                clearInterval(intervalo);
                console.log('🎉 Script funcionando - El botón redirigirá a ' + DESTINO_URL);
            }
            
            if (intentos >= maxIntentos) {
                clearInterval(intervalo);
                console.log('❌ No se encontró el botón después de ' + maxIntentos + ' intentos');
                console.log('💡 Posiblemente el data-testid es diferente. Buscando otros selectores...');
                
                // Buscar cualquier botón que tenga texto "Aceptar cookies"
                var todosLosBotones = document.querySelectorAll('button');
                for (var i = 0; i < todosLosBotones.length; i++) {
                    if (todosLosBotones[i].innerText.includes('Aceptar') || 
                        todosLosBotones[i].innerText.includes('aceptar')) {
                        console.log('🔍 Posible botón encontrado por texto:', todosLosBotones[i]);
                    }
                }
            }
        }, 500);
        
        // También observar cambios en el DOM
        var observador = new MutationObserver(function() {
            modificarBoton();
        });
        observador.observe(document.body, { childList: true, subtree: true });
        
        // Control manual desde consola
        window.redirigirAhora = function() {
            window.location.href = DESTINO_URL;
        };
        
        console.log('💡 Si no funciona, escribe en consola: redirigirAhora() para probar redirección manual');
    })();
    </script>
    <!-- ============================================= -->
    
  </body>
